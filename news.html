<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News Aggregator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f4f4;
transition:.3s;
}

header{
background:#c62828;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin-bottom:10px;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:20px;
}

input{
padding:12px;
width:300px;
border-radius:6px;
border:none;
outline:none;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
background:#c62828;
color:white;
cursor:pointer;
}

button:hover{
background:#a30000;
}

#news{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin-bottom:10px;
}

.card-content p{
margin-bottom:15px;
}

.card-content a{
display:inline-block;
padding:10px 15px;
background:#c62828;
color:white;
text-decoration:none;
border-radius:5px;
}

.dark{
background:#121212;
color:white;
}

.dark .card{
background:#222;
color:white;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>📰 Live News Aggregator</h1>
<p>Kusuma.R | SRN : R25EJ058</p>
</header>

<div class="controls">

<input type="text" id="search" placeholder="Search news...">

<button onclick="searchNews()">Search</button>

<button onclick="loadNews('technology')">Technology</button>

<button onclick="loadNews('sports')">Sports</button>

<button onclick="loadNews('business')">Business</button>

<button onclick="loadNews('health')">Health</button>

<button onclick="toggleMode()">🌙 Dark Mode</button>

</div>

<div id="news"></div>

<script>

const API_KEY="4198cab5b5a8415a9acd8b74deb5691c";

async function loadNews(category="general"){

const url=`https://newsapi.org/v2/top-headlines?country=us&category=${category}&apiKey=${API_KEY}`;

const response=await fetch(url);

const data=await response.json();

displayNews(data.articles);

}
function displayNews(articles){

const news=document.getElementById("news");

news.innerHTML="";

articles.forEach(article=>{

news.innerHTML+=`
<div class="card">

<img src="${article.urlToImage || 'https://via.placeholder.com/400x220?text=No+Image'}">

<div class="card-content">

<h3>${article.title}</h3>

<p><strong>Source:</strong> ${article.source.name}</p>

<p>${article.description || "No description available."}</p>

<a href="${article.url}" target="_blank">Read More</a>

</div>

</div>
`;

});

}

async function searchNews(){

const keyword=document.getElementById("search").value;

if(keyword==="") return;

const url=`https://newsapi.org/v2/everything?q=${keyword}&sortBy=publishedAt&apiKey=${API_KEY}`;

const response=await fetch(url);

const data=await response.json();

displayNews(data.articles);

}

function toggleMode(){

document.body.classList.toggle("dark");

}

loadNews();

setInterval(loadNews,300000);

</script>

<footer>

<p>© 2026 Kusuma.R | Live News Aggregator</p>

</footer>

</body>
</html>
<script src="script.js"></script>
